name: Send daily countdown

on:
  schedule:
    # 13:00 UTC = 9:00am Toronto (EDT) / 3:00pm K\u00f6ln (CEST)
    - cron: "0 13 * * *"
  workflow_dispatch: {}

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install requests playwright
      - run: playwright install --with-deps chromium
      - run: python capture_countdown.py
      - run: python send_countdown.py
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          ADMIN_CHAT_ID: ${{ secrets.ADMIN_CHAT_ID }}
          CUSTOMER_CHAT_ID: ${{ secrets.CUSTOMER_CHAT_ID }}
          PAGES_URL: ${{ secrets.PAGES_URL }}
