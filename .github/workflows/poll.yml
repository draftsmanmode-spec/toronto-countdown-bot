name: Poll for brother's messages

on:
  schedule:
    - cron: "*/5 * * * *"   # every 5 minutes
  workflow_dispatch: {}

permissions:
  contents: write   # needed so this workflow can commit state.json back

jobs:
  poll:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install requests
      - run: python poll_messages.py
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          ADMIN_CHAT_ID: ${{ secrets.ADMIN_CHAT_ID }}
          CUSTOMER_CHAT_ID: ${{ secrets.CUSTOMER_CHAT_ID }}
      - name: Save progress
        run: |
          if ! git diff --quiet state.json; then
            git config user.name "countdown-bot"
            git config user.email "actions@github.com"
            git add state.json
            git commit -m "update poll offset [skip ci]"
            git push
          else
            echo "No change to state.json, nothing to commit."
          fi
